<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="auth-container card">
        <div class="card-body">
            <h2 class="text-center mb-4">Your Profile</h2>
            
            <!-- Feedback Messages -->
            <div id="update-success-message" class="alert alert-success" style="display: none;"></div>
            <div id="update-error-message" class="alert alert-danger" style="display: none;"></div>

            <div class="mb-3">
                <label for="update-name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="update-name">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="update-age" class="form-label">Age</label>
                    <input type="number" class="form-control" id="update-age">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="update-gender" class="form-label">Gender</label>
                    <select id="update-gender" class="form-select">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="update-height" class="form-label">Height (cm)</label>
                    <input type="number" class="form-control" id="update-height">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="update-weight" class="form-label">Weight (kg)</label>
                    <input type="number" class="form-control" id="update-weight">
                </div>
            </div>
            <button class="btn btn-primary w-100" onclick="updateProfile()">Save Changes</button>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
