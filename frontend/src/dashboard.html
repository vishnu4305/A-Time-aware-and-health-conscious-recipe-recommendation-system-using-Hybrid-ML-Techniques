<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Recipe Recommender</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar text-white px-4 d-flex justify-content-between align-items-center">
        <div class="navbar-brand text-white">🍽️ Smart Recipes</div>
        <div>
            <a href="profile.html" class="btn btn-secondary me-2 text-white" style="text-decoration: none;">My Profile</a>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-5 p-4">
        <h1 id="welcome-message">Welcome!</h1>
        <p class="text-muted">Ready for some personalized, health-conscious meals?</p>
        
        <div class="slider-container mt-4 mb-4">
            <label for="gamma-slider" class="form-label">Taste vs. Health Preference:</label>
            <input type="range" class="form-range w-100" id="gamma-slider" min="0" max="1" step="0.1" value="0.5">
            <div class="d-flex justify-content-between text-muted small">
                <span>More Taste (0.0)</span>
                <span>Balanced (0.5)</span>
                <span>More Health (1.0)</span>
            </div>
            
            <button class="btn btn-primary mt-3 w-100" onclick="getRecommendations()">
                Get My Recommendations
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading-spinner" class="loading" style="display: none;">
            <h3>🧠 AI is analyzing recipes... please wait.</h3>
        </div>

        <!-- Grid where recipes will appear -->
        <div id="recipes-grid" class="recommendation-grid"></div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
