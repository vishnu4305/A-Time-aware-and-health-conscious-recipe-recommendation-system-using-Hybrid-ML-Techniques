<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login or Register</title>
    <!-- Link to your existing CSS file -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="auth-container card">
        <div class="card-body">
            <h2 class="text-center mb-4">Welcome!</h2>

            <!-- Section 1: Username Input (Always Visible) -->
            <div id="username-section">
                <div class="mb-3">
                    <label for="username-input" class="form-label">Enter Your Username</label>
                    <input type="text" class="form-control" id="username-input" placeholder="e.g., vishnu123">
                </div>
                <button class="btn btn-primary w-100" onclick="checkUserAndLogin()">Continue</button>
            </div>

            <!-- Section 2: Full Registration Form (Initially Hidden) -->
            <div id="registration-section" style="display: none;">
                <hr class="my-4">
                <h3 class="text-center mb-3">Complete Your Profile</h3>
                <div class="mb-3">
                    <label for="name-input" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name-input">
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="age-input" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age-input">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="gender-select" class="form-label">Gender</label>
                        <select id="gender-select" class="form-select">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="height-input" class="form-label">Height (cm)</label>
                        <input type="number" class="form-control" id="height-input">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="weight-input" class="form-label">Weight (kg)</label>
                        <input type="number" class="form-control" id="weight-input">
                    </div>
                </div>
                <button class="btn btn-success w-100" onclick="registerNewUser()">Register & Login</button>
            </div>
            <div id="error-message" class="alert alert-danger mt-3" style="display: none;"></div>
        </div>
    </div>

    <!-- Link to your new JavaScript file -->
    <script src="auth.js"></script>
</body>
</html>
